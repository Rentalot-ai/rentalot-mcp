# CI disabled — re-enable by removing the workflow block
workflow:
  rules:
    - when: never

stages:
  - check
  - publish

lint-typecheck-build:
  stage: check
  image: oven/bun:1
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - bun install --frozen-lockfile
    - bun run lint
    - bun run typecheck
    - bun run build
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG =~ /^v\d+/

test:
  stage: check
  image: oven/bun:1
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - bun install --frozen-lockfile
    - bun run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG =~ /^v\d+/

publish-npm:
  stage: publish
  image: node:22-slim
  script:
    - npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
    - npm publish --access public
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
